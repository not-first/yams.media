# YAMS Documentation - Material for MkDocs Configuration

# Site metadata
site_name: YAMS - Yet Another Media Server
site_url: https://yams.media
site_description: YAMS is a basic but powerful media server installation script
site_author: YAMS Contributors
copyright: "&copy; 2025 YAMS Contributors"

# Repository
repo_url: https://github.com/not-first/yams.media
repo_name: not-first/yams.media
edit_uri: edit/mkdocs-material/docs/

# Directory configuration
docs_dir: docs
site_dir: site

# Theme configuration
theme:
  name: material
  logo: pics/logo.png
  favicon: favicon.ico
  custom_dir: overrides
  language: en

  # Color palette - dual theme toggle
  palette:
    # Light mode
    - scheme: yams
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Dark mode
    - scheme: yams-dark
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  # Navigation features
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.action.edit
    - content.action.view

# Custom CSS
extra_css:
  - stylesheets/extra.css

# Plugins
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

# Social links
extra:
  alternate:
    - name: English
      link: /
      lang: en
    - name: French
      link: /fr/
      lang: fr
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/Gwae3tNMST
      name: Join YAMS Discord

    - icon: fontawesome/solid/comments
      link: https://forum.yams.media
      name: YAMS Forum

    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/rogs/yams
      name: YAMS on GitLab

    - icon: fontawesome/brands/github
      link: https://github.com/rogsme/yams
      name: YAMS on GitHub

    - icon: fontawesome/brands/git-alt
      link: https://git.rogs.me/rogs/yams
      name: YAMS on Gitea

    - icon: fontawesome/solid/mug-hot
      link: https://www.buymeacoffee.com/rogs
      name: Support YAMS

# Navigation structure
nav:
  - Home: index.md
  - Install:
      - install/index.md
      - install/description.md
      - install/steps.md
      - install/using-the-cli.md
  - Configure:
      - config/index.md
      - config/recommendations.md
      - config/prowlarr.md
      - config/qbittorrent.md
      - config/sabnzbd.md
      - config/radarr.md
      - config/sonarr.md
      - config/bazarr.md
      - config/jellyfin.md
      - config/plex.md
      - config/emby.md
      - config/running-everything-together.md
  - Advanced:
      - advanced/index.md
      - advanced/torrenting.md
      - advanced/vpn.md
      - advanced/wireguard.md
      - advanced/port-forwarding.md
      - advanced/remote-access.md
      - advanced/env-file.md
      - advanced/backups.md
      - advanced/prowlarr-behind-vpn.md
      - advanced/seeding-with-qbitmanage.md
      - advanced/autobrr.md
      - advanced/lidarr.md
      - advanced/portainer.md
      - advanced/proxmox-lxc-prerequisites.md
      - advanced/add-your-own-containers.md
  - FAQs:
      - faqs/index.md
      - faqs/common-errors.md
  - Donate: donate/index.md
  - Contact: contact/index.md

# Markdown extensions
markdown_extensions:
  # Python Markdown
  - attr_list
  - toc:
      permalink: true

  # Python Markdown Extensions
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
