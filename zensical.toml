[project]
site_name = "YAMS - Yet Another Media Server"
site_url = "https://yams.media"
site_description = "YAMS is a basic but powerful media server installation script"
site_author = "YAMS Contributors"
copyright = "&copy; 2025 YAMS Contributors"
repo_url = "https://gitlab.com/rogs/yams"
repo_name = "YAMS"
extra_css = ["stylesheets/extra.css"]

# Social links in footer
[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/Gwae3tNMST"
name = "Join YAMS Discord"

[[project.extra.social]]
icon = "fontawesome/solid/comments"
link = "https://forum.yams.media"
name = "YAMS Forum"

[[project.extra.social]]
icon = "fontawesome/brands/gitlab"
link = "https://gitlab.com/rogs/yams"
name = "YAMS on GitLab"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/rogsme/yams"
name = "YAMS on GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/git-alt"
link = "https://git.rogs.me/rogs/yams"
name = "YAMS on Gitea"

[[project.extra.social]]
icon = "fontawesome/solid/mug-hot"
link = "https://www.buymeacoffee.com/rogs"
name = "Support YAMS"


# Directory configuration
docs_dir = "docs"
site_dir = "site"

# Navigation structure
nav = [
  { "Home" = "index.md" },
  { "Install" = [
    "install/index.md",
    "install/description.md",
    "install/steps.md",
    "install/using-the-cli.md",
  ] },
  { "Configure" = [
    "config/index.md",
    "config/recommendations.md",
    "config/prowlarr.md",
    "config/qbittorrent.md",
    "config/sabnzbd.md",
    "config/radarr.md",
    "config/sonarr.md",
    "config/bazarr.md",
    "config/jellyfin.md",
    "config/plex.md",
    "config/emby.md",
    "config/running-everything-together.md",
  ] },
  { "Advanced" = [
    "advanced/index.md",
    "advanced/torrenting.md",
    "advanced/vpn.md",
    "advanced/wireguard.md",
    "advanced/port-forwarding.md",
    "advanced/remote-access.md",
    "advanced/env-file.md",
    "advanced/backups.md",
    "advanced/prowlarr-behind-vpn.md",
    "advanced/seeding-with-qbitmanage.md",
    "advanced/autobrr.md",
    "advanced/lidarr.md",
    "advanced/portainer.md",
    "advanced/proxmox-lxc-prerequisites.md",
    "advanced/add-your-own-containers.md",
  ] },
  { "FAQs" = [
    "faqs/index.md",
    "faqs/common-errors.md",
  ] },
  { "Donate" = "donate/index.md" },
  { "Contact" = "contact/index.md" },
  { "Forum" = "https://forum.yams.media" },
  { "Discord" = "https://discord.gg/Gwae3tNMST" },
]

# Theme configuration
[project.theme]
logo = "pics/logo.png"
favicon = "favicon.ico"
custom_dir = "overrides"

# Enable navigation features
features = [
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.tabs",
  "navigation.sections",
  "navigation.indexes",
  "navigation.path",
  "navigation.top",
  "navigation.footer",
  "toc.follow",
]

# Palette toggle for light mode
[[project.theme.palette]]
scheme = "default"
primary = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
scheme = "slate"
primary = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
